services:
  db:
    image: postgis/postgis:16-3.4
    container_name: remedyradar-db
    environment:
      POSTGRES_USER: remedy
      POSTGRES_PASSWORD: remedy
      POSTGRES_DB: remedyradar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remedy -d remedyradar"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
